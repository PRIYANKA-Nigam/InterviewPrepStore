<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="description"
content="Download Android Projects, PHP Projects, Source Code, APKs, Interview Resources and Learning Materials.">

content="Android Source Code, PHP Source Code, Java Projects, Interview Prep">

<meta name="author"
content="Interview Prep For Insiders">

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/payment.css">

href="https://fonts.googleapis.com">

href="https://fonts.gstatic.com"
crossorigin>

<body>


<!-- ==========================
HEADER
========================== -->

<header class="header">

<div class="container">

<div class="logo">

Interview Prep For Insiders

</div>

<ul class="nav-menu">

<li>

<a href="https://interviewprepforinsiders.blogspot.com">

Blog

</a>

</li>

<li>

<a href="mailto:YOURMAIL">

Support

</a>

</li>

</ul>

</div>

</header>


<!-- ==========================
CHECKOUT
========================== -->

<section class="checkout">

<div class="container">

<div id="productCard" class="checkout-card">

<div class="product-image">

<img
id="productIcon"
src=""
alt="Product">

</div>

<div class="product-details">

<h2 id="productName">

Loading...

</h2>

<p id="productDescription">

Please wait...

</p>

<div class="price-box">

<span id="productType">

APK

</span>

<span id="productPrice">

₹0

</span>

</div>

</div>

</div>

<div class="checkout-info">

<p>

✔ Secure manual verification

</p>

<p>

✔ Download link sent by email

</p>

<p>

✔ Usually delivered within 24 hours

</p>

</div>

<div id="checkoutContainer">

<!-- app.js creates order form here -->

</div>

</div>

</section>



<!-- ==========================
LOADER
========================== -->

<div
id="loader"
class="loader hidden">

<div class="spinner"></div>

<p>

Loading Checkout...

</p>

</div>

<div class="order-summary">

    <h3>Order Summary</h3>

    <p><b>Project:</b> <span id="summaryProject"></span></p>

    <p><b>Product:</b> <span id="summaryType"></span></p>

    <p><b>Amount:</b> <span id="summaryPrice"></span></p>

</div>

<!-- ==========================
PAYMENT MODAL
========================== -->

<div
id="paymentModal"
class="payment-modal hidden">

<div
id="paymentContent">

</div>

</div>



<!-- ==========================
FOOTER
========================== -->

<footer>

<div class="container">

<p>

© 2026 Interview Prep For Insiders

</p>

</div>

</footer>

</body>

</html>
